version: '3.8'

services:
  # Base de Datos SQL Server 2022
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_lab
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password_Fuerte_123!
    ports:
      - "1433:1433"
    volumes:
      - ./init.sql:/init.sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Password_Fuerte_123!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Vulnerable
  vulnerable-app:
    build:
      context: ./laboratorio-sql
      dockerfile: Dockerfile
    container_name: vulnerable_app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=LabSQLi;User Id=sa;Password=Password_Fuerte_123!;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy

  # Aplicación Segura
  secure-app:
    build:
      context: ./laboratorio-sql-seguro
      dockerfile: Dockerfile
    container_name: secure_app
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_URLS=http://+:8081
      - ConnectionStrings__DefaultConnection=Server=db;Database=LabSQLi;User Id=sa;Password=Password_Fuerte_123!;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
